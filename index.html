    mapLocations: [],
    mapPaths: [],
    lore: {
      categories: ["Geography", "Factions", "Magic", "Bestiary", "History", "Pantheon"],
      entries: [],
    },
    sessions: [],
    consequenceLog: [],
  };
}

// STATE MANAGEMENT — REDUCER + CONTEXT
// ═══════════════════════════════════════════════════════════════

const GameContext = createContext();

function gameReducer(state, action) {
  switch (action.type) {
    case 'SET_PANEL': return { ...state, activePanel: action.payload };
    case 'SET_TAB': return { ...state, tabs: { ...state.tabs, [action.panel]: action.payload } };
    case 'SELECT_ITEM': return { ...state, selected: { ...state.selected, [action.category]: action.payload } };
    case 'ADD_NOTIFICATION': return { ...state, notifications: [...state.notifications, { ...action.payload, id: Date.now() + Math.random(), timestamp: Date.now() }] };
    case 'REMOVE_NOTIFICATION': return { ...state, notifications: state.notifications.filter(n => n.id !== action.payload) };
    case 'TOGGLE_LEVELUP': return { ...state, showLevelUp: action.payload };
    case 'NEXT_TURN': {
      const next = (state.combatTurn + 1) % (state.gameData.combat.turnOrder || []).length;
      return { ...state, combatTurn: next };
    }

    // ─── Chat actions ───
    case 'ADD_CHAT_MESSAGE': return { ...state, chatMessages: [...state.chatMessages, { ...action.payload, id: Date.now() + Math.random(), timestamp: Date.now() }] };
    case 'SET_STREAMING': return { ...state, isStreaming: action.payload };
    case 'UPDATE_STREAM_TEXT': {
      const msgs = [...state.chatMessages];
      const last = msgs[msgs.length - 1];
      if (last && last.role === 'dm') { msgs[msgs.length - 1] = { ...last, content: action.payload }; }
      return { ...state, chatMessages: msgs };
    }

    // ─── API config ───
    case 'SET_API_KEY': return { ...state, apiKey: action.payload };
    case 'SET_MODEL': return { ...state, model: action.payload };
    case 'SET_API_PROVIDER': return { ...state, apiProvider: action.payload };
    case 'SET_REMEMBER_KEY': return { ...state, rememberKey: action.payload };
    case 'SET_API_STATUS': return { ...state, apiStatus: action.payload };
    case 'SET_DM_ENGINE': return { ...state, dmEngine: action.payload };

    // ─── Game state updates from metadata tags ───
    case 'UPDATE_CAMPAIGN': return { ...state, gameData: { ...state.gameData, campaign: { ...state.gameData.campaign, ...action.payload } } };
    case 'UPDATE_CHARACTER': return { ...state, gameData: { ...state.gameData, character: { ...state.gameData.character, ...action.payload } } };
    case 'UPDATE_STAT': {
      const { stat, value, prevValue } = action.payload;
      const trend = value > (prevValue || 0) ? 'up' : value < (prevValue || 0) ? 'down' : 'stable';
      return { ...state, gameData: { ...state.gameData, character: { ...state.gameData.character, stats: { ...state.gameData.character.stats, [stat]: { value, prevValue: prevValue || state.gameData.character.stats[stat]?.value || 0, trend } } } } };
    }
    case 'UPDATE_VITALS': {
      const ch = { ...state.gameData.character };
      if (action.payload.hp !== undefined) ch.hp = { ...ch.hp, current: action.payload.hp };
      if (action.payload.mp !== undefined) ch.mp = { ...ch.mp, current: action.payload.mp };
      if (action.payload.xp !== undefined) ch.ep = { ...ch.ep, current: action.payload.xp };
      if (action.payload.sanity !== undefined) ch.sanity = { ...ch.sanity, current: action.payload.sanity };
      if (action.payload.gold !== undefined) ch.gold = action.payload.gold;
      return { ...state, gameData: { ...state.gameData, character: ch } };
    }
    case 'ADD_CONDITION': {
      const conds = [...state.gameData.character.conditions, action.payload];
      return { ...state, gameData: { ...state.gameData, character: { ...state.gameData.character, conditions: conds } } };
    }
    case 'REMOVE_CONDITION': {
      const conds = state.gameData.character.conditions.filter(c => c.name !== action.payload);
      return { ...state, gameData: { ...state.gameData, character: { ...state.gameData.character, conditions: conds } } };
    }
    case 'ADD_ITEM': {
      const cat = action.payload.category || 'keyItems';
      const inv = { ...state.gameData.inventory };
      inv[cat] = [...(inv[cat] || []), action.payload.item];
      return { ...state, gameData: { ...state.gameData, inventory: inv } };
    }
    case 'REMOVE_ITEM': {
      const inv = { ...state.gameData.inventory };
      for (const cat of Object.keys(inv)) {
        inv[cat] = inv[cat].filter(i => i.name !== action.payload);
      }
      return { ...state, gameData: { ...state.gameData, inventory: inv } };
    }
    case 'UPDATE_QUEST': {
      const exists = state.gameData.quests.some(q => q.id === action.payload.id);
      if (exists) {
        const quests = state.gameData.quests.map(q => q.id === action.payload.id ? { ...q, ...action.payload } : q);
        return { ...state, gameData: { ...state.gameData, quests } };
      } else {
        // Auto-create new quest if it doesn't exist
        const newQuest = { id: action.payload.id, title: action.payload.objective || action.payload.id, type: action.payload.type || 'active', status: action.payload.status || 'active', progress: parseInt(action.payload.progress) || 0, objective: action.payload.objective || '', steps: [] };
        return { ...state, gameData: { ...state.gameData, quests: [...state.gameData.quests, newQuest] } };
      }
    }
    case 'ADD_QUEST': {
      return { ...state, gameData: { ...state.gameData, quests: [...state.gameData.quests, action.payload] } };
    }
    case 'UPDATE_NPC': {
      const npcs = state.gameData.npcs.map(n => n.name === action.payload.name ? { ...n, ...action.payload } : n);
      const exists = state.gameData.npcs.some(n => n.name === action.payload.name);
      return { ...state, gameData: { ...state.gameData, npcs: exists ? npcs : [...state.gameData.npcs, action.payload] } };
    }
    case 'UPDATE_TRACKER': {
      const trackers = { ...state.gameData.hiddenTrackers };
      if (trackers[action.payload.tracker]) {
        trackers[action.payload.tracker] = { ...trackers[action.payload.tracker], value: action.payload.value, hint: action.payload.hint || trackers[action.payload.tracker].hint };
      }
      return { ...state, gameData: { ...state.gameData, hiddenTrackers: trackers } };
    }
    case 'ADD_MAP_LOCATION': {
      const locs = state.gameData.mapLocations || [];
      const locId = action.payload.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      const exists = locs.some(l => l.id === locId);
      if (exists) {
        // Mark existing location as current, demote previous current to explored
        const updated = locs.map(l => ({
          ...l,
          status: l.id === locId ? 'current' : (l.status === 'current' ? 'explored' : l.status),
        }));
        return { ...state, gameData: { ...state.gameData, mapLocations: updated } };
      }
      // Add new location — place it in a grid pattern based on how many exist
      const count = locs.length;
      const col = count % 4;
      const row = Math.floor(count / 4);
      const x = 10 + col * 22 + (row % 2 ? 11 : 0); // stagger rows
      const y = 15 + row * 20;
      const moodToDanger = { 'Lethal': 'high', 'Hostile': 'high', 'Combat': 'high', 'Ominous': 'medium', 'Tense': 'medium', 'Eerie': 'medium' };
      const danger = moodToDanger[action.payload.mood] || 'low';
      const icons = ['🏚', '🏛', '⛪', '🕯', '⚔', '🌀', '🕳', '🏰', '🗿', '🌿'];
      const icon = icons[count % icons.length];
      // Demote old current to explored
      const updatedLocs = locs.map(l => ({ ...l, status: l.status === 'current' ? 'explored' : l.status }));
      const newLoc = { id: locId, name: action.payload.name, icon, x, y, status: 'current', danger, desc: '' };
      // Add path from previous current location
      const prevCurrent = locs.find(l => l.status === 'current');
      const paths = [...(state.gameData.mapPaths || [])];
      if (prevCurrent) {
        paths.push({ from: prevCurrent.id, to: locId, traveled: true });
      }
      return { ...state, gameData: { ...state.gameData, mapLocations: [...updatedLocs, newLoc], mapPaths: paths } };
    }
    case 'COMBAT_START': {
      return { ...state, gameData: { ...state.gameData, combat: { active: true, round: 1, location: action.payload.environment || '', turnOrder: [], currentTurn: 0, log: [{ text: '═══ COMBAT BEGINS ═══', type: 'system' }] } } };
    }
    case 'COMBAT_END': {
      return { ...state, gameData: { ...state.gameData, combat: { ...state.gameData.combat, active: false } } };
    }
    case 'ADD_XP': {
      const amount = parseInt(action.payload.amount) || 0;
      const ep = { ...state.gameData.character.ep };
      ep.current = ep.current + amount;
      // Handle level-up if current >= max
      let ch = { ...state.gameData.character, ep };
      if (ep.current >= ep.max && ep.max > 0) {
        ch.level = (ch.level || 1) + 1;
        ep.current = ep.current - ep.max;
        ep.max = Math.floor(ep.max * 1.4); // Scale XP needed for next level
        ch.ep = ep;
      }
      return { ...state, gameData: { ...state.gameData, character: ch } };
    }
    case 'ADD_ABILITY': {
      const abilities = [...(state.gameData.character.abilities || [])];
      // Don't add duplicates
      if (!abilities.some(a => a.name === action.payload.name)) {
        abilities.push(action.payload);
      }
      return { ...state, gameData: { ...state.gameData, character: { ...state.gameData.character, abilities } } };
    }
    case 'ADD_LORE': {
      const entries = [...state.gameData.lore.entries, { ...action.payload, discovered: true }];
      return { ...state, gameData: { ...state.gameData, lore: { ...state.gameData.lore, entries } } };
    }

    // ─── Vitals Config ───
    case 'REVEAL_VITAL': {
      const vc = { ...(state.gameData.vitalsConfig || {}) };
      const v = action.payload.vital;
      vc[v] = { ...(vc[v] || {}), visible: true, ...(action.payload.label && { label: action.payload.label }), ...(action.payload.fullLabel && { fullLabel: action.payload.fullLabel }), ...(action.payload.icon && { icon: action.payload.icon }) };
      return { ...state, gameData: { ...state.gameData, vitalsConfig: vc } };
    }

    // ─── Campaign Wizard ───
    case 'SET_WORLD_BIBLE': return { ...state, worldBible: action.payload };
    case 'SHOW_CAMPAIGN_WIZARD': return { ...state, showCampaignWizard: action.payload };
    case 'START_NEW_CAMPAIGN': {
      return { ...state, gameData: action.payload.gameData, worldBible: action.payload.worldBible, chatMessages: [], showCampaignWizard: false };
    }

    case 'SET_PENDING_OPENING': return { ...state, pendingOpening: action.payload };
    case 'SET_CHAT_TEXT_SIZE': return { ...state, chatTextSize: action.payload };

    // ─── Persistence ───
    case 'LOAD_GAME_STATE': return { ...state, ...action.payload };
    case 'SET_GAME_DATA': return { ...state, gameData: action.payload };
    case 'SET_ACTIVE_SAVE': return { ...state, activeSaveId: action.payload };

    default: return state;
  }
}

const initialState = {
  activePanel: 'dashboard',
  tabs: { character: 'stats', inventory: 'equipped', codex: 'Geography' },
  selected: { inventory: null, npc: null, quest: null, codex: null, map: null, session: null },
  notifications: [],
  showLevelUp: false,
  combatTurn: 0,
  // Chat + API state
  chatMessages: [],
  isStreaming: false,
  apiKey: '',
  model: 'claude-sonnet-4-20250514',
  apiProvider: 'openrouter',
  apiStatus: 'disconnected', // disconnected | connected | testing | error
  dmEngine: '',
  gameData: DEFAULT_GAME_DATA,
  // Campaign wizard
  worldBible: '',
  showCampaignWizard: false,
  // Security
  rememberKey: false,
  // Opening scene trigger
  pendingOpening: false,
  // Server persistence
  activeSaveId: null,
};

function GameProvider({ children }) {
  const [state, dispatch] = useReducer(gameReducer, initialState);

  // Load from localStorage on mount
  useEffect(() => {
    try {
      const savedRemember = localStorage.getItem('dnd-rememberKey') === 'true';
      const savedKey = savedRemember ? localStorage.getItem('dnd-apiKey') : sessionStorage.getItem('dnd-apiKey');
      const savedModel = localStorage.getItem('dnd-model');
      const savedChat = localStorage.getItem('dnd-chat');
      const savedGameData = localStorage.getItem('dnd-gameData');
      const savedWorldBible = localStorage.getItem('dnd-worldBible');
      if (savedRemember) dispatch({ type: 'SET_REMEMBER_KEY', payload: true });
      if (savedKey) dispatch({ type: 'SET_API_KEY', payload: savedKey });
      if (savedModel) dispatch({ type: 'SET_MODEL', payload: savedModel });
      if (savedChat) {
        try { const msgs = JSON.parse(savedChat); msgs.forEach(m => dispatch({ type: 'ADD_CHAT_MESSAGE', payload: m })); } catch(e) {}
      }
      if (savedGameData) {
        try { dispatch({ type: 'SET_GAME_DATA', payload: JSON.parse(savedGameData) }); } catch(e) {}
      }
      if (savedWorldBible) dispatch({ type: 'SET_WORLD_BIBLE', payload: savedWorldBible });
      const savedTextSize = localStorage.getItem('dnd-chatTextSize');
      if (savedTextSize) dispatch({ type: 'SET_CHAT_TEXT_SIZE', payload: savedTextSize });
    } catch(e) {}

    // Try to load from server (most recent save)
    fetch('/api/saves').then(r => r.json()).then(saves => {
      if (saves.length > 0) {
        const latest = saves.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];
        fetch(`/api/saves/${latest.id}`).then(r => r.json()).then(save => {
          if (save.game_data) dispatch({ type: 'SET_GAME_DATA', payload: save.game_data });
          if (save.chat_messages) {
            dispatch({ type: 'LOAD_GAME_STATE', payload: { chatMessages: save.chat_messages } });
          }
          if (save.world_bible) dispatch({ type: 'SET_WORLD_BIBLE', payload: save.world_bible });
          if (save.api_model) dispatch({ type: 'SET_MODEL', payload: save.api_model });
          dispatch({ type: 'SET_ACTIVE_SAVE', payload: latest.id });
        }).catch(() => {});
      }
    }).catch(() => {
      // Server saves unavailable, localStorage is the fallback
    });

    // Load DM Engine
    fetch('/dm-engine.md').then(r => r.ok ? r.text() : '').then(t => {
      if (t) dispatch({ type: 'SET_DM_ENGINE', payload: t });
    }).catch(() => {});
  }, []);

  // Auto-save to localStorage (debounced)
  const saveTimer = useRef(null);
  useEffect(() => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      try {
        if (state.apiKey) {
          if (state.rememberKey) {
            localStorage.setItem('dnd-apiKey', state.apiKey);
            sessionStorage.removeItem('dnd-apiKey');
          } else {
            sessionStorage.setItem('dnd-apiKey', state.apiKey);
            localStorage.removeItem('dnd-apiKey');
          }
        }
        localStorage.setItem('dnd-rememberKey', state.rememberKey.toString());
        if (state.model) localStorage.setItem('dnd-model', state.model);
        localStorage.setItem('dnd-apiProvider', state.apiProvider);
        // Save last 50 messages
        const trimmed = state.chatMessages.slice(-50);
        localStorage.setItem('dnd-chat', JSON.stringify(trimmed));
        localStorage.setItem('dnd-gameData', JSON.stringify(state.gameData));
        if (state.worldBible) localStorage.setItem('dnd-worldBible', state.worldBible);
      } catch(e) {}
    }, 2000);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
  }, [state.chatMessages, state.gameData, state.apiKey, state.model, state.apiProvider, state.worldBible, state.rememberKey]);

  // Auto-save to server (separate, longer debounce)
  const serverSaveTimer = useRef(null);
  useEffect(() => {
    if (serverSaveTimer.current) clearTimeout(serverSaveTimer.current);
    serverSaveTimer.current = setTimeout(() => {
      if (!state.gameData || !state.gameData.campaign) return;
      const savePayload = {
        save_name: state.gameData.campaign.name || 'autosave',
        game_data: state.gameData,
        chat_messages: state.chatMessages.slice(-50),
        world_bible: state.worldBible || '',
        api_model: state.model,
      };

      if (state.activeSaveId) {
        fetch(`/api/saves/${state.activeSaveId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(savePayload),
        }).catch(() => {});
      } else {
        fetch('/api/saves', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(savePayload),
        }).then(r => r.json()).then(data => {
          if (data.id) dispatch({ type: 'SET_ACTIVE_SAVE', payload: data.id });
        }).catch(() => {});
      }
    }, 5000);
    return () => { if (serverSaveTimer.current) clearTimeout(serverSaveTimer.current); };
  }, [state.chatMessages, state.gameData, state.model, state.worldBible, state.activeSaveId]);

  return React.createElement(GameContext.Provider, { value: { state, dispatch } }, children);
}

function useGame() { return useContext(GameContext); }

// METADATA TAG PARSER
// ═══════════════════════════════════════════════════════════════

const TAG_REGEX = /\[([A-Z_]+):\s*([^\]]+)\]/g;

function parseTagParams(paramStr) {
  const params = {};
  const regex = /(\w+)\s*=\s*(?:"([^"]*)"|'([^']*)'|\[([^\]]*)\]|(\S+))/g;
  let m;
  while ((m = regex.exec(paramStr)) !== null) {
    const key = m[1];
    const val = m[2] !== undefined ? m[2] : m[3] !== undefined ? m[3] : m[4] !== undefined ? m[4].split(',').map(s => s.trim().replace(/['"]/g, '')) : m[5];
    if (!isNaN(val) && val !== '' && typeof val === 'string') { params[key] = parseFloat(val); }
    else { params[key] = val; }
  }
  return params;
}

function parseMetadataTags(text) {
  const tags = [];
  let cleanText = text;
  let match;
  const re = /\[([A-Z_]+):\s*([^\]]+)\]/g;
  while ((match = re.exec(text)) !== null) {
    tags.push({ type: match[1], params: parseTagParams(match[2]), raw: match[0] });
  }
  for (const tag of tags) { cleanText = cleanText.replace(tag.raw, ''); }
  return { cleanText: cleanText.replace(/\n{3,}/g, '\n\n').trim(), tags };
}

function dispatchTagActions(tags, dispatch) {
  for (const tag of tags) {
    const p = tag.params;
    switch (tag.type) {
      case 'SCENE_UPDATE':
        dispatch({ type: 'UPDATE_CAMPAIGN', payload: { location: p.location, time: p.time, day: p.day, mood: p.mood } });
        // Auto-add location to map if it doesn't exist yet
        if (p.location) {
          dispatch({ type: 'ADD_MAP_LOCATION', payload: { name: p.location, mood: p.mood } });
        }
        break;
      case 'STAT_CHANGE':
        dispatch({ type: 'UPDATE_STAT', payload: { stat: p.stat, value: p.new || p.value, prevValue: p.old } });
        // Only show notification if value actually changed
        if (parseInt(p.new || p.value) !== parseInt(p.old)) {
          dispatch({ type: 'ADD_NOTIFICATION', payload: { title: `${p.stat} ${(p.new||0) > (p.old||0) ? 'INCREASED' : 'DECREASED'}`, body: p.reason || '', statChanges: [{ stat: p.stat, from: p.old, to: p.new || p.value, dir: (p.new||0) > (p.old||0) ? 'increase' : 'decrease' }] } });
        }
        break;
      case 'HP_CHANGE':
        dispatch({ type: 'UPDATE_VITALS', payload: { hp: p.new || p.value } });
        if ((p.new||0) < (p.old||999)) dispatch({ type: 'ADD_NOTIFICATION', payload: { title: 'DAMAGE TAKEN', body: p.reason || '', style: 'critical', statChanges: [{ stat: 'HP', from: p.old, to: p.new, dir: 'decrease' }] } });
        break;
      case 'MP_CHANGE':
        dispatch({ type: 'UPDATE_VITALS', payload: { mp: p.new || p.value } });
        break;
      case 'XP_GAIN':
        dispatch({ type: 'ADD_XP', payload: { amount: parseInt(p.amount) || 0 } });
        dispatch({ type: 'ADD_NOTIFICATION', payload: { title: 'EXPERIENCE GAINED', body: `+${p.amount} XP — ${p.reason || p.source || ''}`, style: 'success' } });
        break;
      case 'ITEM_ACQUIRED': {
        const itemType = (p.type || '').toLowerCase();
        const equipTypes = ['weapon', 'armor', 'shield', 'accessory', 'ring', 'amulet', 'helmet', 'boots', 'gloves'];
        const consumeTypes = ['consumable', 'potion', 'scroll', 'food', 'drink'];
        const materialTypes = ['material', 'reagent', 'ingredient', 'ore', 'gem'];
        const keyTypes = ['key', 'quest', 'special'];
        let category = 'keyItems';
        if (equipTypes.some(t => itemType.includes(t))) category = 'equipped';
        else if (consumeTypes.some(t => itemType.includes(t))) category = 'consumables';
        else if (materialTypes.some(t => itemType.includes(t))) category = 'materials';
        else if (keyTypes.some(t => itemType.includes(t))) category = 'keyItems';
        const iconMap = { weapon: '⚔', armor: '🛡', shield: '🛡', ring: '💍', amulet: '📿', accessory: '💎', consumable: '🧪', potion: '🧪', scroll: '📜', material: '🔮', key: '🔑', tool: '🔧', relic: '✨', valuable: '💰', lore: '📖' };
        const icon = Object.entries(iconMap).find(([k]) => itemType.includes(k))?.[1] || '🔮';
        dispatch({ type: 'ADD_ITEM', payload: { category, item: { name: p.name, rarity: p.rarity || 'common', icon, desc: p.desc || '', qty: 1, weight: 0 } } });
        dispatch({ type: 'ADD_NOTIFICATION', payload: { title: 'ITEM ACQUIRED', body: `${p.name} (${p.rarity || 'common'}) — ${p.desc || ''}`, style: 'arcane' } });
        break;
      }
      case 'ITEM_REMOVED':
        dispatch({ type: 'REMOVE_ITEM', payload: p.name });
        break;
      case 'QUEST_UPDATE':
        dispatch({ type: 'UPDATE_QUEST', payload: { id: p.id, status: p.status, progress: p.progress, objective: p.objective } });
        dispatch({ type: 'ADD_NOTIFICATION', payload: { title: 'QUEST UPDATED', body: `${p.id} — ${p.objective || p.status || ''}`, style: 'success' } });
        break;
      case 'NPC_UPDATE':
        dispatch({ type: 'UPDATE_NPC', payload: { name: p.name, relationship: p.relationship, status: p.status, location: p.location, loyalty: p.loyalty } });
        break;
      case 'COMBAT_START':
        dispatch({ type: 'COMBAT_START', payload: { environment: p.environment } });
        dispatch({ type: 'ADD_NOTIFICATION', payload: { title: '⚔ COMBAT INITIATED', body: p.environment || 'Roll initiative!', style: 'critical' } });
        break;
      case 'COMBAT_END':
        dispatch({ type: 'COMBAT_END', payload: {} });
        dispatch({ type: 'ADD_NOTIFICATION', payload: { title: 'COMBAT ENDED', body: `Result: ${p.result || 'Victory'}${p.xp ? ` — +${p.xp} XP` : ''}`, style: 'success' } });
        break;
      case 'ROLL_RESULT':
        dispatch({ type: 'ADD_NOTIFICATION', payload: { title: `ROLL: ${p.type || 'Check'}`, body: `Rolled ${p.rolled}${p.modifier ? `+${p.modifier}` : ''} vs DC ${p.dc || '?'} — ${p.result || ''}`, style: p.result === 'success' || p.result === 'critical_success' ? 'success' : 'critical' } });
        break;
      case 'HIDDEN_TRACKER':
        dispatch({ type: 'UPDATE_TRACKER', payload: { tracker: p.tracker, value: p.new_value, hint: p.hint } });
        break;
      case 'CONDITION_ADD':
        dispatch({ type: 'ADD_CONDITION', payload: { name: p.name, type: p.type || 'neutral', desc: p.desc || '', icon: p.type === 'buff' ? '⚡' : p.type === 'debuff' ? '💀' : '👁' } });
        break;
      case 'CONDITION_REMOVE':
        dispatch({ type: 'REMOVE_CONDITION', payload: p.name });
        break;
      case 'LORE_UNLOCK':
        dispatch({ type: 'ADD_LORE', payload: { title: p.title, category: p.category || 'History', content: p.content || '???' } });
        dispatch({ type: 'ADD_NOTIFICATION', payload: { title: 'LORE UNLOCKED', body: `${p.category}: ${p.title}`, style: 'arcane' } });
        break;
      case 'REVEAL_VITAL':
        dispatch({ type: 'REVEAL_VITAL', payload: { vital: p.vital, label: p.label, fullLabel: p.fullLabel, icon: p.icon } });
        dispatch({ type: 'ADD_NOTIFICATION', payload: { title: 'VITAL REVEALED', body: `${p.label || p.vital} has been unlocked!`, style: 'arcane' } });
        break;
      case 'ABILITY_ADD':
        dispatch({ type: 'ADD_ABILITY', payload: { name: p.name, type: p.type || 'Active', desc: p.desc || '', cost: p.cost || '', cooldown: p.cooldown || '', icon: p.type === 'Passive' ? '🛡' : p.type === 'Reaction' ? '⚡' : '✨' } });
        dispatch({ type: 'ADD_NOTIFICATION', payload: { title: 'NEW ABILITY UNLOCKED', body: `${p.name} (${p.type || 'Active'}) — ${p.desc || ''}`, style: 'arcane' } });
        break;
    }
  }
}


// ═══════════════════════════════════════════════════════════════
// DM TEXT FORMATTER — paragraphs, bold, combat blocks
// ═══════════════════════════════════════════════════════════════

function formatDMText(text) {
  if (!text) return null;

  // Helper: convert **bold** markers to <strong> within a string
  function parseBold(str) {
    const parts = str.split(/\*\*(.+?)\*\*/g);
    if (parts.length === 1) return str;
    return parts.map((part, i) =>
      i % 2 === 1 ? React.createElement('strong', { key: i }, part) : part
    );
  }

  // Helper: detect decorative separator lines (═══, ───, ***, ---, etc.)
  function isSeparator(line) {
    const t = line.trim();
    return /^[═─━\-*_~]{3,}$/.test(t);
  }

  // Split text into lines for processing
  const lines = text.split('\n');
  const sections = [];
  let currentNarrative = [];
  let currentCombat = [];
  let inCombat = false;

  for (const line of lines) {
    const trimmed = line.trim();

    // Skip decorative separator lines (═══, ───, etc.)
    if (isSeparator(trimmed)) {
      // If we're in combat, just skip it (it's a border around the block)
      // If not in combat, also skip — it's a pre-combat separator
      continue;
    }

    // Detect combat status block start
    if (/^\*{0,2}\*?COMBAT STATUS/i.test(trimmed)) {
      // Flush any narrative before combat
      if (currentNarrative.length > 0) {
        sections.push({ type: 'narrative', text: currentNarrative.join('\n') });
        currentNarrative = [];
      }
      inCombat = true;
      currentCombat = [trimmed];
      continue;
    }

    if (inCombat) {
      if (trimmed === '') {
        // Empty line ends combat block
        sections.push({ type: 'combat', lines: currentCombat });
        currentCombat = [];
        inCombat = false;
      } else {
        currentCombat.push(trimmed);
      }
    } else {
      currentNarrative.push(line);
    }
  }

  // Flush remaining
  if (inCombat && currentCombat.length > 0) {
    sections.push({ type: 'combat', lines: currentCombat });
  }
  if (currentNarrative.length > 0) {
    sections.push({ type: 'narrative', text: currentNarrative.join('\n') });
  }

  // If no sections parsed, treat whole text as narrative
  if (sections.length === 0) {
    sections.push({ type: 'narrative', text });
  }

  const elements = [];
  let key = 0;

  for (const section of sections) {
    if (section.type === 'combat') {
      // Render combat status as structured block
      const header = section.lines[0].replace(/\*+/g, '').trim();
      const dataLines = section.lines.slice(1);

      elements.push(
        React.createElement('div', { className: 'combat-status', key: key++ },
          React.createElement('div', { className: 'combat-header' }, header),
          ...dataLines.map((ln, j) => {
            // Clean up: strip bold markers, fix [Name]: bracket patterns
            let clean = ln.replace(/\*+/g, '').trim();
            // Convert [Guardian A (Right)]: Action → Guardian A (Right): Action
            clean = clean.replace(/^\[([^\]]+)\]:\s*/g, '$1: ');
            // Also handle [Distance]: pattern
            clean = clean.replace(/^\[([^\]]+)\]\s*/g, '$1 ');
            return React.createElement('div', { className: 'combat-line', key: j },
              /^(distance|range)/i.test(clean) ? '📏 ' + clean : '⚔ ' + clean
            );
          })
        )
      );
    } else {
      // Split narrative into paragraphs
      let paragraphs = section.text.split(/\n\n+/);

      // Smart-split long single paragraphs (>3 sentences)
      const expanded = [];
      for (const para of paragraphs) {
        const trimmedPara = para.trim();
        if (!trimmedPara) continue;

        // Count sentences (rough: split on ". " followed by uppercase or end)
        const sentences = trimmedPara.split(/(?<=[.!?])\s+(?=[A-Z"'"])/);
        if (sentences.length > 4) {
          // Split into chunks of ~3 sentences
          let chunk = [];
          for (let i = 0; i < sentences.length; i++) {
            chunk.push(sentences[i]);
            if (chunk.length >= 3 && i < sentences.length - 1) {
              expanded.push(chunk.join(' '));
              chunk = [];
            }
          }
          if (chunk.length > 0) expanded.push(chunk.join(' '));
        } else {
          expanded.push(trimmedPara);
        }
      }

      for (const para of expanded) {
        if (para.trim()) {
          elements.push(
            React.createElement('p', { key: key++ }, parseBold(para.trim()))
          );
        }
      }
    }
  }

  return elements;
}


// ═══════════════════════════════════════════════════════════════
// SYSTEM PROMPT BUILDER
// ═══════════════════════════════════════════════════════════════

function buildSystemPrompt(dmEngine, gameData, worldBible) {
  const worldState = JSON.stringify({
    campaign: gameData.campaign,
    character: {
      name: gameData.character.name,
      race: gameData.character.race,
      class: gameData.character.class,
      level: gameData.character.level,
      hp: gameData.character.hp,
      mp: gameData.character.mp,
      sanity: gameData.character.sanity,
      gold: gameData.character.gold,
      stats: gameData.character.stats,
      conditions: gameData.character.conditions.map(c => c.name),
      abilities: gameData.character.abilities.map(a => a.name),
    },
    inventory: {
      equipped: gameData.inventory.equipped.map(i => i.name),
      consumables: gameData.inventory.consumables.map(i => `${i.name} x${i.qty}`),
      keyItems: gameData.inventory.keyItems.map(i => i.name),
    },
    quests: gameData.quests.filter(q => q.status === 'active').map(q => ({ title: q.title, progress: q.progress })),
    npcs: gameData.npcs.map(n => ({ name: n.name, relationship: n.relationship, location: n.location })),
    combat: gameData.combat.active ? { active: true, round: gameData.combat.round } : { active: false },
    vitalsConfig: gameData.vitalsConfig || {},
  }, null, 2);

  const tagInstructions = `

CRITICAL — METADATA TAG INSTRUCTIONS:
You MUST include metadata tags after EVERY response. The companion app ONLY updates through these tags. If you don't emit tags, the player's stats, inventory, quests, and abilities will NOT update. This is CRITICAL — the companion app is DEAD without your tags.

Tags are parsed silently — the player never sees them.
Format: [TAG_TYPE: key=value, key=value]

Available tags:
[SCENE_UPDATE: location="...", time="...", day=N, mood="..."]
[STAT_CHANGE: stat="...", old=N, new=N, reason="..."]
[HP_CHANGE: old=N, new=N, reason="..."]
[MP_CHANGE: old=N, new=N, reason="..."]
[XP_GAIN: amount=N, source="...", reason="..."]
[ITEM_ACQUIRED: name="...", rarity="...", type="...", desc="..."]
[ITEM_REMOVED: name="...", reason="..."]
[QUEST_UPDATE: id="...", status="...", progress=N, objective="..."]
[NPC_UPDATE: name="...", relationship="...", status="...", location="..."]
[COMBAT_START: enemies="...", environment="..."]
[COMBAT_END: result="...", xp=N]
[ROLL_RESULT: type="...", rolled=N, modifier=N, dc=N, result="..."]
[HIDDEN_TRACKER: tracker="...", change=N, new_value=N]
[CONDITION_ADD: name="...", type="...", desc="..."]
[CONDITION_REMOVE: name="..."]
[LORE_UNLOCK: category="...", title="...", content="..."]
[REVEAL_VITAL: vital="mp|sanity", label="...", fullLabel="...", icon="..."]
[ABILITY_ADD: name="...", type="Active|Passive|Reaction", desc="...", cost="...", cooldown="..."]

IMPORTANT RULES FOR TAGS:
- ALWAYS emit [NPC_UPDATE] the FIRST time the player meets any named NPC.
- ALWAYS emit [ABILITY_ADD] when the player discovers or unlocks a new ability.
- ALWAYS emit [XP_GAIN] when the player earns experience. This MUST include the amount.
- Use [STAT_CHANGE] ONLY when a stat value actually changes — do not re-emit current values.
- In your FIRST response of a new campaign, emit [STAT_CHANGE] for all 5 core stats, [HP_CHANGE], and [XP_GAIN] to initialize the companion app.

Note: vitalsConfig in world state shows which vitals are currently visible. Use REVEAL_VITAL to unlock hidden vitals when narratively appropriate. Only reveal vitals that are currently hidden (visible: false).

ALWAYS include relevant tags at the END of your response. The companion app depends entirely on these tags.`;

  // Replace [YOUR WORLD] placeholders with actual world name
  let processedEngine = dmEngine;
  if (gameData.campaign.name) {
    processedEngine = dmEngine.replace(/\[YOUR WORLD\]/g, gameData.campaign.name);
  }

  // Build prompt layers: DM Engine → World Bible → World State → Tag Instructions
  const worldBibleSection = worldBible ? `\n\n═══ WORLD BIBLE ═══\n${worldBible}\n` : '';
  return `${processedEngine}${worldBibleSection}\n\n═══ CURRENT WORLD STATE ═══\n${worldState}\n${tagInstructions}`;
}


// ═══════════════════════════════════════════════════════════════
// STREAMING CHAT — sends messages to API, processes SSE stream
// ═══════════════════════════════════════════════════════════════

async function sendChatMessage(message, state, dispatch) {
  if (!state.apiKey) {
    dispatch({ type: 'ADD_CHAT_MESSAGE', payload: { role: 'system', content: '⚠ No API key configured. Go to Settings → API Configuration to add your key.' } });
    return;
  }

  // Add player message
  dispatch({ type: 'ADD_CHAT_MESSAGE', payload: { role: 'player', content: message } });

  // Build messages for API (last 40 messages for context)
  const recentMessages = [...state.chatMessages, { role: 'player', content: message }].slice(-40).map(m => ({
    role: m.role === 'player' ? 'user' : 'assistant',
    content: m.content,
  })).filter(m => m.role === 'user' || m.role === 'assistant');

  // Add placeholder DM message for streaming
  dispatch({ type: 'ADD_CHAT_MESSAGE', payload: { role: 'dm', content: '' } });
  dispatch({ type: 'SET_STREAMING', payload: true });

  const systemPrompt = buildSystemPrompt(state.dmEngine, state.gameData, state.worldBible);

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        apiKey: state.apiKey,
        model: state.model,
        provider: state.apiProvider || 'openrouter',
        messages: recentMessages,
        systemPrompt,
        maxTokens: 4096,
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({ message: 'Connection failed' }));
      dispatch({ type: 'UPDATE_STREAM_TEXT', payload: `⚠ Error: ${err.message || 'Unknown error'}` });
      dispatch({ type: 'SET_STREAMING', payload: false });
      return;
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';
    let streamDone = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done || streamDone) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') { streamDone = true; break; }

        try {
          const event = JSON.parse(data);
          if (event.type === 'message_stop') { streamDone = true; break; }
          if (event.type === 'content_block_delta' && event.delta?.text) {
            fullText += event.delta.text;
            const { cleanText } = parseMetadataTags(fullText);
            dispatch({ type: 'UPDATE_STREAM_TEXT', payload: cleanText });
          }
          if (event.type === 'error') {
            dispatch({ type: 'UPDATE_STREAM_TEXT', payload: `⚠ ${event.error?.message || 'Stream error'}` });
          }
        } catch(e) { /* skip unparseable SSE lines */ }
      }
      if (streamDone) break;
    }

    // Final parse — dispatch metadata tags
    const { cleanText, tags } = parseMetadataTags(fullText);
    dispatch({ type: 'UPDATE_STREAM_TEXT', payload: cleanText });
    if (tags.length > 0) dispatchTagActions(tags, dispatch);

  } catch (err) {
    dispatch({ type: 'UPDATE_STREAM_TEXT', payload: `⚠ Connection error: ${err.message}` });
  }

  dispatch({ type: 'SET_STREAMING', payload: false });
}


// ═══════════════════════════════════════════════════════════════
// WORLD BIBLE GENERATOR
// ═══════════════════════════════════════════════════════════════

function generateWorldBible(w) {
  const sentientMap = { yes: 'The world is alive and sentient — it watches, judges, and responds to the actions of its inhabitants.', partially: 'The world carries echoes of sentience — residual awareness that manifests in strange coincidences, shifting landscapes, and whispered warnings.', no: 'The world is a standard planet — indifferent to its inhabitants, governed by natural laws.' };
  const ageMap = { standard: 'This is an established world with layered history, civilizations, and deep-rooted traditions.', young: 'This is a new world, raw and unformed — its rules are still being written, its boundaries still being tested.', dying: 'This is a dying world — its magic fading, its lands crumbling, its people clinging to what remains.' };
  const horrorMap = { none: 'Horror is absent — danger exists, but it is physical and comprehensible.', creeping: 'A creeping dread pervades the world — things are wrong in ways that are hard to articulate, and the truth is always worse than expected.', visceral: 'Horror is visceral and ever-present — the world contains genuine nightmares, body horror, psychological torment, and entities that break minds.' };
  const comedyMap = { serious: 'The tone is consistently serious and grounded.', dry: 'Dry wit and dark humor punctuate the tension — gallows humor is a survival mechanism.', chaotic: 'Chaos and absurdity are woven into the fabric of the world — the universe has a sick sense of humor.' };
  const magicMap = { none: 'Magic does not exist in this world. All power is mundane.', low: 'Magic is rare and feared — most people live their entire lives without witnessing it.', common: 'Magic is a known force — practiced by specialists, regulated by authorities, and woven into daily life.', high: 'Magic saturates everything — the air hums with it, children are born with it, and reality itself is negotiable.' };
  const sourceMap = { learned: 'Magic is learned through rigorous study, practice, and mentorship — a discipline like any other craft.', innate: 'Magic is innate — a birthright carried in the blood, awakened by circumstance or heredity.', custom: 'The source of magic is unique to this world — the DM will establish how magic manifests based on the campaign\'s needs.' };
  const costMap = { free: 'Magic flows freely with minimal personal cost — it is a tool like any other.', expensive: 'Magic demands a price — fatigue, shortened lifespan, sanity erosion, or material sacrifice.', catastrophic: 'Every use of magic risks catastrophe — unintended consequences, corruption, or attracting the attention of things best left undisturbed.' };
  const locationMap = { settlement: 'a remote settlement', ruins: 'ancient ruins', city: 'a sprawling city', wilderness: 'untamed wilderness', prison: 'a prison or place of confinement' };
  const situationMap = { stranger: 'A stranger arrives in an unfamiliar place — no allies, no reputation, no safety net.', local: 'A local whose ordinary life is shattered by sudden crisis — everything familiar becomes dangerous.', amnesia: 'Awakening with no memory — fragments of identity surface through play, and the truth may be unwelcome.', hired: 'Hired for a job that is more than it appears — the employer has secrets, the task has hidden layers.' };

  let bible = `# World Bible: ${w.worldName}\n\n`;
  bible += `## Core Identity\n`;
  bible += `**${w.worldName}** — ${w.premise || 'A world of adventure and mystery.'}\n\n`;
  bible += `${sentientMap[w.sentient] || sentientMap.no} ${ageMap[w.worldAge] || ageMap.ancient}\n\n`;

  bible += `## Tone & Atmosphere\n`;
  const darknessLabel = w.darkness <= 25 ? 'Grimdark' : w.darkness <= 50 ? 'Dark with glimmers of hope' : w.darkness <= 75 ? 'Balanced between darkness and hope' : 'Hopeful with shadows at the edges';
  bible += `The world sits at **${darknessLabel}** on the spectrum (${w.darkness}/100 hope). `;
  bible += `${horrorMap[w.horror] || horrorMap.none} ${comedyMap[w.comedy] || comedyMap.serious}\n`;
  if (w.inspirations && w.inspirations.length > 0) {
    bible += `\nInspirational touchstones: ${w.inspirations.join(', ')}.\n`;
  }
  bible += `\n`;

  bible += `## Magic System\n`;
  bible += `${magicMap[w.magicLevel] || magicMap.common} ${sourceMap[w.magicSource] || sourceMap.internal} ${costMap[w.magicCost] || costMap.expensive}\n`;
  if (w.magicFlavor) {
    bible += `\nMagic in ${w.worldName} manifests as: ${w.magicFlavor}\n`;
  }
  if (w.essenceLabel) {
    bible += `\nMagical energy is called **${w.essenceLabel}** in this world.\n`;
  }
  if (w.sanityLabel && w.sanityLabel !== 'Sanity') {
    bible += `Mental fortitude is tracked as **${w.sanityLabel}**.\n`;
  }
  if (w.essenceVisible === false || w.sanityVisible === false) {
    const hidden = [];
    if (w.essenceVisible === false) hidden.push(w.essenceLabel || 'Energy');
    if (w.sanityVisible === false) hidden.push(w.sanityLabel || 'Sanity');
    bible += `\n**Hidden vitals:** ${hidden.join(', ')} — these are not yet revealed to the player. Use [REVEAL_VITAL] when the narrative makes it appropriate (e.g., first magical awakening, first encounter with madness).\n`;
  }
  bible += `\n`;

  bible += `## Starting Scenario\n`;
  bible += `The story begins in ${locationMap[w.startingLocation] || 'an unknown place'}. `;
  bible += `${situationMap[w.openingSituation] || situationMap.stranger}\n`;
  if (w.initialConflict) {
    bible += `\nImmediate conflict: ${w.initialConflict}\n`;
  }
  if (w.factions) {
    bible += `\nFactions & power structures: ${w.factions}\n`;
  }
  bible += `\n`;

  bible += `## Player Character\n`;
  bible += `**Player:** ${w.playerName || 'Adventurer'}\n`;
  if (w.characterName) bible += `**Character Name:** ${w.characterName}\n`;
  if (w.race && w.race !== 'decide') bible += `**Race:** ${w.race}\n`;
  if (w.race === 'decide') bible += `**Race:** To be determined by the world during character creation.\n`;
  if (w.characterConcept) bible += `**Concept/Hooks:** ${w.characterConcept}\n`;
  bible += `\nClass, stats, abilities, and detailed backstory will be established through the Opening Instructions character creation process.\n`;

  return bible;
}

// PARTICLE BACKGROUND
// ═══════════════════════════════════════════════════════════════

function ParticleBackground() {
  const canvasRef = useRef(null);
  const particles = useRef([]);
  const animRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    const runes = ['⊕','⊗','△','◇','☽','⟐','⊹','✧','◈','⟡','⊛','⟁'];
    const count = 40;

    particles.current = Array.from({ length: count }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.2 - 0.1,
      size: 8 + Math.random() * 14,
      opacity: 0.05 + Math.random() * 0.15,
      rune: runes[Math.floor(Math.random() * runes.length)],
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.005 + Math.random() * 0.015,
    }));

    function draw() {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles.current) {
        p.x += p.vx; p.y += p.vy; p.pulse += p.pulseSpeed;
        if (p.x < -20) p.x = w + 20; if (p.x > w + 20) p.x = -20;
        if (p.y < -20) p.y = h + 20; if (p.y > h + 20) p.y = -20;
        const alpha = p.opacity * (0.5 + 0.5 * Math.sin(p.pulse));
        ctx.font = `${p.size}px serif`;
        ctx.fillStyle = `rgba(201, 168, 76, ${alpha})`;
        ctx.fillText(p.rune, p.x, p.y);
      }
      animRef.current = requestAnimationFrame(draw);
    }
    draw();

    const onResize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
    window.addEventListener('resize', onResize);
    return () => { cancelAnimationFrame(animRef.current); window.removeEventListener('resize', onResize); };
  }, []);

  return <canvas ref={canvasRef} className="particles-canvas" />;
}

function NotificationOverlay() {
  const { state, dispatch } = useGame();
  const [visible, setVisible] = useState([]);
  const processedRef = useRef(new Set());
  const timersRef = useRef([]);

  // Stagger new notifications in with 1s delay between each
  useEffect(() => {
    const newOnes = state.notifications.filter(n => !processedRef.current.has(n.id));
    newOnes.forEach((n, i) => {
      processedRef.current.add(n.id);
      // Stagger: 1s delay between each notification appearing
      const showTimer = setTimeout(() => {
        setVisible(prev => [...prev, { ...n, phase: 'entering' }]);
        // After 1.5s fade-in, switch to visible
        const visibleTimer = setTimeout(() => {
          setVisible(prev => prev.map(v => v.id === n.id ? { ...v, phase: 'visible' } : v));
        }, 1500);
        // After 6s visible, start 1.5s fade-out
        const exitTimer = setTimeout(() => {
          setVisible(prev => prev.map(v => v.id === n.id ? { ...v, phase: 'exiting' } : v));
        }, 7500);
        // After fade-out completes, remove entirely
        const removeTimer = setTimeout(() => {
          setVisible(prev => prev.filter(v => v.id !== n.id));
          processedRef.current.delete(n.id);
          dispatch({ type: 'REMOVE_NOTIFICATION', payload: n.id });
        }, 9000);
        timersRef.current.push(visibleTimer, exitTimer, removeTimer);
      }, i * 1000);
      timersRef.current.push(showTimer);
    });
    return () => { timersRef.current.forEach(clearTimeout); timersRef.current = []; };
  }, [state.notifications]);

  // Play notification sound cue
  const playSound = useCallback((style) => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      if (style === 'critical') { osc.frequency.value = 180; osc.type = 'sawtooth'; }
      else if (style === 'success') { osc.frequency.value = 660; osc.type = 'sine'; }
      else if (style === 'arcane') { osc.frequency.value = 440; osc.type = 'triangle'; }
      else { osc.frequency.value = 520; osc.type = 'sine'; }
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }, []);

  // Play sound when new notification enters
  useEffect(() => {
    const entering = visible.filter(v => v.phase === 'entering');
    entering.forEach(n => playSound(n.style));
  }, [visible.length]);

  return (
    <div className="notification-overlay">
      {visible.map(n => (
        <div key={n.id} className={`system-notification ${n.style || ''} notif-${n.phase}`}>
          <div className="notification-border">═══════════════════════════════</div>
          <div className="notification-title">{n.title}</div>
          <div className="notification-body">{n.body}</div>
          {n.statChanges && (
            <div className="notification-stat-change">
              {n.statChanges.map((s, i) => (
                <div key={i} className="stat-change-line">
                  <span className="stat-change-name">{s.stat}</span>
                  <span className={`stat-change-value ${s.dir}`}>{s.from} → {s.to}</span>
                </div>
              ))}
            </div>
          )}
          <div className="notification-border">═══════════════════════════════</div>
        </div>
      ))}
    </div>
  );
}

function QuestPanel() {
  const { state, dispatch } = useGame();
  const sel = state.selected.quest;
  const quests = state.gameData.quests;

  const groups = [
    { label: 'Main Quest', type: 'main', icon: '👑' },
    { label: 'Active', type: 'active', icon: '🔥' },
    { label: 'Completed', type: 'completed', icon: '✅' },
    { label: 'Rumored', type: 'rumored', icon: '❓' },
    { label: 'Failed', type: 'failed', icon: '💀' },
  ];

  return (
    <div>
      <div className="section-header">
        <h1 className="section-title"><span className="icon">📜</span> Quest Tracker</h1>
        <span className="section-count">{quests.filter(q=>q.status==='active').length} active</span>
      </div>

      {groups.map(g => {
        let filtered;
        if (g.type === 'main') {
          filtered = quests.filter(q => q.type === 'main' && q.status !== 'completed' && q.status !== 'failed');
        } else if (g.type === 'active') {
          filtered = quests.filter(q => q.type !== 'main' && q.status === 'active');
        } else if (g.type === 'completed') {
          filtered = quests.filter(q => q.status === 'completed');
        } else if (g.type === 'failed') {
          filtered = quests.filter(q => q.status === 'failed');
        } else {
          filtered = quests.filter(q => q.type === g.type || q.status === g.type);
        }
        if (filtered.length === 0) return null;
        return (
          <div key={g.type} style={{marginBottom:20}}>
            <h3 style={{fontSize:'0.85rem',color:'var(--silver)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
              {g.icon} {g.label}
            </h3>
            {filtered.map(q => (
              <QuestEntry key={q.id} quest={q} selected={sel===q.id}
                onClick={() => dispatch({ type: 'SELECT_ITEM', category: 'quest', payload: q.id })} />
            ))}
          </div>
        );
      })}
    </div>
  );
}

function RelationshipWeb() {
  const svgRef = useRef(null);
  const { state, dispatch } = useGame();
  const selectedNpc = state.selected.npc;

  useEffect(() => {
    if (!svgRef.current || !window.d3) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();
    const width = 600, height = 400;
    svg.attr('viewBox', `0 0 ${width} ${height}`);

    // Click SVG background to deselect
    svg.on('click', () => { dispatch({ type: 'SELECT_ITEM', category: 'npc', payload: null }); });

    // Glow filter for selected node
    const defs = svg.append('defs');
    const filter = defs.append('filter').attr('id', 'node-glow');
    filter.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'coloredBlur');
    const feMerge = filter.append('feMerge');
    feMerge.append('feMergeNode').attr('in', 'coloredBlur');
    feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

    const rels = state.gameData.npcRelationships;
    const npcList = state.gameData.npcs;
    const allNames = new Set();
    rels.forEach(r => { allNames.add(r.source); allNames.add(r.target); });
    const nodes = Array.from(allNames).map(name => {
      const npc = npcList.find(n => n.name === name);
      return { id: name, avatar: npc ? npc.avatar : '⚔️', relationship: npc ? npc.relationship : 'neutral', isPlayer: name === state.gameData.character.name };
    });
    const links = rels.map(r => ({ source: r.source, target: r.target, type: r.type }));

    const sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(100))
      .force('charge', d3.forceManyBody().strength(-200))
      .force('center', d3.forceCenter(width/2, height/2))
      .force('collision', d3.forceCollide().radius(30));

    // Links — selection-aware opacity
    const linkColors = { ally: '#4caf50', hostile: '#c62828', neutral: '#4fc3f7', unknown: '#3a3a55' };
    const link = svg.append('g').selectAll('line').data(links).enter().append('line')
      .attr('stroke', d => linkColors[d.type] || linkColors.neutral)
      .attr('stroke-width', d => {
        if (!selectedNpc) return 1.5;
        const src = typeof d.source === 'string' ? d.source : d.source.id;
        const tgt = typeof d.target === 'string' ? d.target : d.target.id;
        return (src === selectedNpc || tgt === selectedNpc) ? 3 : 1;
      })
      .attr('stroke-opacity', d => {
        if (!selectedNpc) return 0.5;
        const src = typeof d.source === 'string' ? d.source : d.source.id;
        const tgt = typeof d.target === 'string' ? d.target : d.target.id;
        return (src === selectedNpc || tgt === selectedNpc) ? 1 : 0.12;
      });

    // Nodes — click handler + selection-aware styling
    const nodeG = svg.append('g').selectAll('g').data(nodes).enter().append('g')
      .style('cursor', 'pointer')
      .on('click', (event, d) => {
        event.stopPropagation();
        dispatch({ type: 'SELECT_ITEM', category: 'npc', payload: d.id === selectedNpc ? null : d.id });
      })
      .call(d3.drag()
        .on('start', (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
        .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
        .on('end', (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
      );

    const nodeColors = { ally: '#2e7d32', neutral: '#1a6b8a', hostile: '#8b1a1a', rumored: '#3a3a55' };
    nodeG.append('circle')
      .attr('r', d => d.isPlayer ? 22 : (d.id === selectedNpc ? 20 : 16))
      .attr('fill', d => d.id === selectedNpc ? '#2a1f10' : '#1a1a2e')
      .attr('stroke', d => {
        if (d.id === selectedNpc) return '#f5d478';
        return d.isPlayer ? '#c9a84c' : nodeColors[d.relationship] || '#3a3a55';
      })
      .attr('stroke-width', d => {
        if (d.id === selectedNpc) return 4;
        return d.isPlayer ? 3 : 2;
      })
      .attr('filter', d => d.id === selectedNpc ? 'url(#node-glow)' : null);

    nodeG.append('text').text(d => d.avatar).attr('text-anchor', 'middle').attr('dy', '0.35em')
      .attr('font-size', d => d.isPlayer ? '14px' : (d.id === selectedNpc ? '13px' : '11px'))
      .style('pointer-events', 'none');
    nodeG.append('text').text(d => d.id.split(' ')[0]).attr('text-anchor', 'middle')
      .attr('dy', d => d.isPlayer ? 36 : (d.id === selectedNpc ? 34 : 28))
      .attr('fill', d => d.id === selectedNpc ? '#f5d478' : '#9d9dba')
      .attr('font-size', d => d.id === selectedNpc ? '10px' : '9px')
      .attr('font-weight', d => d.id === selectedNpc ? '600' : '400')
      .style('pointer-events', 'none');

    // Dim unconnected nodes when one is selected
    if (selectedNpc) {
      const connectedNames = new Set([selectedNpc]);
      rels.forEach(r => {
        if (r.source === selectedNpc) connectedNames.add(r.target);
        if (r.target === selectedNpc) connectedNames.add(r.source);
      });
      nodeG.style('opacity', d => connectedNames.has(d.id) ? 1 : 0.3);
    }

    sim.on('tick', () => {
      link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
    });
  }, [state.gameData.npcRelationships, state.gameData.npcs, selectedNpc]);

  return <div className="relationship-web"><svg ref={svgRef} style={{width:'100%',height:400}} /></div>;
}

// PANEL: WORLD MAP
// ═══════════════════════════════════════════════════════════════

function MapPanel() {
  const { state, dispatch } = useGame();
  const sel = state.selected.map;
  const locs = state.gameData.mapLocations;
  const paths = state.gameData.mapPaths;

  return (
    <div>
      <div className="section-header">
        <h1 className="section-title"><span className="icon">🗺</span> {state.gameData.campaign.name}</h1>
        <span className="section-count">{locs.filter(l=>l.status!=='unexplored').length}/{locs.length} discovered</span>
      </div>

      <div className="map-container" style={{height:480}}>
        {paths.map((path, i) => {
          const from = locs.find(l => l.id === path.from);
          const to = locs.find(l => l.id === path.to);
          if (!from || !to) return null;
          const x1 = from.x * 5.4 + 28, y1 = from.y * 4.3 + 28;
          const x2 = to.x * 5.4 + 28, y2 = to.y * 4.3 + 28;
          const len = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
          const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
          return <div key={i} className={`map-path ${path.traveled ? 'traveled' : ''}`} style={{left:x1,top:y1,width:len,transform:`rotate(${angle}deg)`}} />;
        })}
        {locs.map(loc => (
          <div key={loc.id}
            className={`map-node ${loc.status} ${loc.danger==='high'||loc.danger==='extreme' ? 'dangerous' : ''}`}
            style={{ left: `${loc.x * 5.4}px`, top: `${loc.y * 4.3}px` }}
            onClick={() => dispatch({ type: 'SELECT_ITEM', category: 'map', payload: loc.id })}
          >
            {loc.status === 'unexplored' ? '❓' : loc.icon}
            <span className="map-node-label">{loc.status === 'unexplored' ? '???' : loc.name}</span>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:16,marginTop:12,fontSize:'0.7rem',color:'var(--muted)'}}>
        <span>🟡 Current</span><span>⚪ Explored</span><span>❓ Unexplored</span><span style={{color:'var(--crimson-bright)'}}>🔴 Dangerous</span>
      </div>
    </div>
  );
}

function SettingsPanel() {
  const { state, dispatch } = useGame();
  const [testStatus, setTestStatus] = useState('');
  const [particles, setParticles] = useState(true);
  const [notifications, setNotifications] = useState(true);

  const keyPrefix = 'sk-or-';

  const testConnection = async () => {
    if (!state.apiKey) { setTestStatus('No API key entered'); return; }
    if (!state.apiKey.startsWith(keyPrefix)) { setTestStatus(`Invalid key format — must start with ${keyPrefix}`); return; }
    setTestStatus('Testing...');
    dispatch({ type: 'SET_API_STATUS', payload: 'testing' });
    try {
      const resp = await fetch('/api/test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ apiKey: state.apiKey, model: state.model, provider: state.apiProvider || 'openrouter' }),
      });
      const data = await resp.json();
      if (data.status === 'ok') {
        setTestStatus('✓ Connected: ' + data.message);
        dispatch({ type: 'SET_API_STATUS', payload: 'connected' });
        // Auto-navigate to wizard if no world exists yet
        if (!state.worldBible) {
          dispatch({ type: 'SHOW_CAMPAIGN_WIZARD', payload: true });
        }
      } else {
        setTestStatus('✗ Error: ' + data.message);
        dispatch({ type: 'SET_API_STATUS', payload: 'error' });
      }
    } catch(e) {
      setTestStatus('✗ Connection failed: ' + e.message);
      dispatch({ type: 'SET_API_STATUS', payload: 'error' });
    }
  };

  // OpenRouter is the only supported provider

  const clearChat = () => {
    if (confirm('Clear all chat messages? Game state will be preserved.')) {
      dispatch({ type: 'LOAD_GAME_STATE', payload: { chatMessages: [] } });
      localStorage.removeItem('dnd-chat');
    }
  };

  const newCampaign = () => {
    dispatch({ type: 'SHOW_CAMPAIGN_WIZARD', payload: true });
  };

  return (
    <div>
      <div className="section-header">
        <h1 className="section-title"><span className="icon">⚙️</span> Settings</h1>
      </div>

      <div className="card">
        <h4 style={{marginBottom:12}}>🔑 API Configuration</h4>

        {/* API Key input */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:'0.78rem',color:'var(--muted)',display:'block',marginBottom:4}}>
            OpenRouter API Key
          </label>
          <input type="password" className="api-input"
            placeholder="sk-or-..."
            value={state.apiKey}
            onChange={e => dispatch({ type: 'SET_API_KEY', payload: e.target.value })}
          />
          {state.apiKey && !state.apiKey.startsWith(keyPrefix) && (
            <div style={{fontSize:'0.7rem',color:'var(--crimson-bright)',marginTop:4,fontFamily:"'Fira Code',monospace"}}>
              Key should start with "sk-or-"
            </div>
          )}
          <div style={{fontSize:'0.68rem',color:'var(--muted)',marginTop:6,lineHeight:1.4}}>
            Get a key at <span style={{color:'var(--gold-dim)',fontFamily:"'Fira Code',monospace"}}>openrouter.ai/keys</span>
          </div>
          <label style={{fontSize:'0.72rem',color:'var(--muted)',display:'flex',alignItems:'center',gap:6,marginTop:8,cursor:'pointer'}}>
            <input type="checkbox" checked={state.rememberKey}
              onChange={e => dispatch({ type: 'SET_REMEMBER_KEY', payload: e.target.checked })} />
            Remember API key across sessions
          </label>
        </div>

        {/* Model dropdown */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:'0.78rem',color:'var(--muted)',display:'block',marginBottom:4}}>Model</label>
          <select className="api-select" value={state.model} onChange={e => dispatch({ type: 'SET_MODEL', payload: e.target.value })}>
            <option value="google/gemini-3-flash-preview">Gemini 3 Flash Preview</option>
            <option value="anthropic/claude-sonnet-4">Claude Sonnet 4</option>
            <option value="anthropic/claude-opus-4">Claude Opus 4</option>
            <option value="anthropic/claude-haiku-3.5">Claude Haiku 3.5</option>
          </select>
        </div>

        {/* Test connection */}
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button className="demo-btn" onClick={testConnection}>Test Connection</button>
          <div className={`api-status ${state.apiStatus}`}>
            {state.apiStatus === 'connected' ? '● Connected' : state.apiStatus === 'testing' ? '◌ Testing...' : state.apiStatus === 'error' ? '✗ Error' : '○ Disconnected'}
          </div>
        </div>
        {testStatus && <div style={{marginTop:8,fontSize:'0.75rem',color:'var(--silver)',fontFamily:"'Fira Code',monospace"}}>{testStatus}</div>}

function ChatPanel() {
  const { state, dispatch } = useGame();
  const [input, setInput] = useState('');
  const [showScrollBtn, setShowScrollBtn] = useState(false);
  const messagesEndRef = useRef(null);
  const messagesContainerRef = useRef(null);
  const textareaRef = useRef(null);

  // Auto-scroll to bottom on new messages (only if near bottom)
  useEffect(() => {
    const container = messagesContainerRef.current;
    if (!container) return;
    const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 120;
    if (isNearBottom) messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [state.chatMessages, state.isStreaming]);

  // Track scroll position for "new message" button
  useEffect(() => {
    const container = messagesContainerRef.current;
    if (!container) return;
    const onScroll = () => {
      const distFromBottom = container.scrollHeight - container.scrollTop - container.clientHeight;
      setShowScrollBtn(distFromBottom > 150);
    };
    container.addEventListener('scroll', onScroll);
    return () => container.removeEventListener('scroll', onScroll);
  }, []);

  // Auto-send opening scene message when a new campaign starts
  useEffect(() => {
    if (state.pendingOpening && state.apiKey && state.worldBible && !state.isStreaming) {
      dispatch({ type: 'SET_PENDING_OPENING', payload: false });
      const worldName = state.gameData.campaign.name || 'this world';
      const openingMsg = `[SYSTEM] A new campaign in ${worldName} has begun. Welcome the player, set the opening scene, establish initial character stats via metadata tags, and ask the player what they want to do.`;
      sendChatMessage(openingMsg, state, dispatch);
    }
  }, [state.pendingOpening, state.apiKey, state.worldBible]);

  const handleSend = () => {
    const msg = input.trim();
    if (!msg || state.isStreaming) return;
    setInput('');
    sendChatMessage(msg, state, dispatch);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  const textSizeMap = { small: '0.85rem', medium: '0.95rem', large: '1.1rem', xl: '1.25rem' };
  const chatTextVar = textSizeMap[state.chatTextSize || 'medium'] || '0.95rem';

  return (
    <div className="chat-panel" style={{ '--chat-text-size': chatTextVar }}>
      <div className="chat-messages" ref={messagesContainerRef}>
        {state.chatMessages.length === 0 && (
          <div className="chat-welcome">
            <div style={{fontSize:'2rem',marginBottom:12}}>⚔️</div>
            <h2 style={{fontFamily:"'Cinzel',serif",color:'var(--gold)',marginBottom:8}}>{state.gameData.campaign.name}</h2>
            <p style={{color:'var(--silver)',fontSize:'0.85rem',lineHeight:1.6,maxWidth:400}}>
              Your AI Dungeon Master awaits. Type a message to begin your adventure.
            </p>
            {state.apiStatus !== 'connected' && (
              <p style={{color:'var(--amber)',fontSize:'0.78rem',marginTop:12,fontFamily:"'Fira Code',monospace"}}>
                ⚙ Configure your API key in Settings to connect
              </p>
            )}
            {state.apiStatus === 'connected' && (
              <p style={{color:'var(--emerald-bright)',fontSize:'0.78rem',marginTop:12,fontFamily:"'Fira Code',monospace"}}>
                ● Connected — Ready to play
              </p>
            )}
          </div>
        )}

        {state.chatMessages.map((msg, i) => (
          <div key={msg.id || i} className={`message-bubble ${msg.role === 'player' ? 'player' : msg.role === 'system' ? 'system-msg' : 'dm'}`}>
            {msg.role === 'dm' && <div className="message-sender">The DM</div>}
            {msg.role === 'player' && <div className="message-sender">You</div>}
            {msg.role === 'system' && <div className="message-sender">System</div>}
            <div className="message-content">{msg.role === 'dm' ? formatDMText(msg.content) : (msg.content || (state.isStreaming && i === state.chatMessages.length - 1 ? '' : ''))}</div>
          </div>
        ))}

        {state.isStreaming && (
          <div className="typing-indicator">
            <span>The DM is writing</span>
            <div className="typing-dots">
              <span className="dot" />
              <span className="dot" />
              <span className="dot" />
            </div>
          </div>
        )}

        <div ref={messagesEndRef} />
      </div>

      {showScrollBtn && (
        <div className="scroll-to-bottom" onClick={() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' })}>
          ↓ New messages
        </div>
      )}

      {state.apiStatus !== 'connected' ? (
        <div className="chat-disconnected-overlay">
          <span className="disconnected-icon">🔑</span>
          <span>Connect your API key in <strong>Settings</strong> to begin</span>
        </div>
      ) : (
        <div className="chat-input-area">
          <textarea
            ref={textareaRef}
            className="chat-textarea"
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder={state.isStreaming ? 'Waiting for the DM...' : 'What do you do?'}
            disabled={state.isStreaming}
            rows={2}
          />
          <button className="chat-send-btn" onClick={handleSend} disabled={state.isStreaming || !input.trim()}>
            ⚔
          </button>
        </div>
      )}
    </div>
  );
}

// MAIN APP — Two-Screen Layout
// ═══════════════════════════════════════════════════════════════

function App() {
  const { state } = useGame();

  const panels = {
    dashboard: DashboardPanel,
    character: CharacterPanel,
    inventory: InventoryPanel,
    quests: QuestPanel,
    npcs: NPCPanel,
    combat: CombatPanel,
    map: MapPanel,
    codex: CodexPanel,
    journal: JournalPanel,
    settings: SettingsPanel,
  };

  const ActivePanel = panels[state.activePanel] || DashboardPanel;
  const [panelFade, setPanelFade] = useState('panel-active');
  const [ctxFade, setCtxFade] = useState('ctx-active');
  const [renderedPanel, setRenderedPanel] = useState(state.activePanel);
  const prevPanelRef = useRef(state.activePanel);

  useEffect(() => {
    if (state.activePanel !== prevPanelRef.current) {
      setPanelFade('panel-exiting');
      setCtxFade('ctx-exiting');
      setTimeout(() => {
        setRenderedPanel(state.activePanel);
        setPanelFade('panel-entering');
        setCtxFade('ctx-entering');
        setTimeout(() => {
          setPanelFade('panel-active');
          setCtxFade('ctx-active');
        }, 250);
      }, 200);
      prevPanelRef.current = state.activePanel;
    }
  }, [state.activePanel]);

  const RenderedPanel = panels[renderedPanel] || DashboardPanel;

  return (
    <React.Fragment>
      <ParticleBackground />
      <Header />
      <div className={`two-screen-layout ${state.gameData.combat.active ? 'combat-active' : ''}`}>
        <ChatPanel />
        <Sidebar />
        <div className="companion-wrapper">
          <div className="companion-content">
            <main className={`companion-main ${panelFade}`}>
              <RenderedPanel />
            </main>
            <aside className={`context-panel ${ctxFade}`}>
              <ContextPanelInner panel={renderedPanel} />
            </aside>
          </div>
        </div>
      </div>
      <Footer />
      <NotificationOverlay />
      <LevelUpOverlay />
      {state.showCampaignWizard && <CampaignWizard />}
    </React.Fragment>
  );
}

// ═══ MOUNT ═══
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  React.createElement(GameProvider, null,
    React.createElement(App)
  )
);
</script>
</body>
</html>
